<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Redirecting to BiteSpeed Menu...</title>
    <script>
        // Parse traditional query parameter and pipe it directly into our modern Hash Router
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        if (id) {
            window.location.replace("index.html#/restaurant/" + id);
        } else {
            window.location.replace("index.html#/restaurants");
        }
    </script>
</head>
<body>
    <p>Loading BiteSpeed Menu... Please wait.</p>
</body>
</html>
